name: JustRunMy 自动续期

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发 (每2天凌晨1点)
  schedule:
    - cron: '0 1 */2 * *'

# 权限配置
permissions:
  contents: write
  actions: write

# 工作流任务
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # ========== Secrets 配置 ==========
      JUSTRUNMY_EMAIL: ${{ secrets.JUSTRUNMY_EMAIL }}
      JUSTRUNMY_PASSWORD: ${{ secrets.JUSTRUNMY_PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      
      # ========== 外部 SOCKS5 代理配置 ==========
      GOST_PROXY_TARGET: ${{ secrets.GOST_PROXY_TARGET }}
      
      # ========== 项目配置 ==========
      SCREENSHOT_DIR: screenshots
    
    steps:
      # 步骤 1: 检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 步骤 2: 设置 Python 环境
      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 步骤 3: 安装系统依赖
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool scrot fonts-noto-cjk wget

      # 🌟 核心新增步骤: 下载并启动 Gost 代理转发隧道
      - name: 🔗 启动 Gost 代理客户端
        run: |
          echo "正在下载 Gost 客户端..."
          # 下载官方 linux-amd64 二进制文件
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          mv gost-linux-amd64-2.11.5 gost
          chmod +x gost
          
          echo "在后台启动代理隧道，将本地 127.0.0.1:8080 转发至目标代理..."
          # 从环境变量获取你的远端代理（支持 socks5:// 或 http://），转成本地 http 代理
          ./gost -L=http://127.0.0.1:8080 -F="${{ env.GOST_PROXY_TARGET }}" > /dev/null 2>&1 &
          
          # 稍等 2 秒让隧道建立
          sleep 2
          echo "✅ Gost 隧道已在后台运行"

      # 步骤 4: 安装 Python 依赖
      - name: 📚 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install seleniumbase aiohttp requests

      # 步骤 5: 执行脚本 (🌟 核心修复：通过命令行无感注入代理参数)
      - name: 🚀 运行续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ env.JUSTRUNMY_EMAIL }}
          JUSTRUNMY_PASSWORD: ${{ env.JUSTRUNMY_PASSWORD }}
          TG_BOT_TOKEN: ${{ env.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ env.TG_CHAT_ID }}
        run: |
          # 关键点：直接追加 --proxy 参数，SeleniumBase 底层会自动无缝接管，完全不需要动 .py 代码！
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py --proxy=http://127.0.0.1:8080

      # 步骤 6: 上传截图
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 7

      # 步骤 7: 清理本地截图
      - name: 🧹 清理本地截图
        if: always()
        run: |
          rm -f *.png
          echo "✅ 本地截图已清理"

      # 步骤 8: 提交执行时间到公开库
      - name: ⏱️ 提交执行时间
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p justrunmy && echo "$(date +'%Y-%m-%d %H:%M:%S')" > justrunmy/time.txt
          git add justrunmy/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新执行时间: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi

      # 步骤 9: 清理旧的工作流运行记录
      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
